<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

cript>
<script>
    if (!localStorage.getItem('isLoggedIn')) { window.location.href = '/login.html'; }
    document.addEventListener('DOMContentLoaded', () => {
        const aside = document.querySelector('aside');
        if (aside) {
            const logoutBtn = document.createElement('button');
            logoutBtn.className = 'mt-4 w-full py-3 bg-red-50 text-red-600 rounded-xl font-label-sm flex items-center justify-center gap-2 hover:bg-red-100 transition-all';
            logoutBtn.innerHTML = '<span class="material-symbols-outlined">logout</span> Logout';
            logoutBtn.onclick = () => { localStorage.removeItem('isLoggedIn'); window.location.href = '/login.html'; };
            aside.appendChild(logoutBtn);
        } else {
            const logoutBtn = document.createElement('button');
            logoutBtn.className = 'fixed bottom-4 right-4 px-4 py-2 bg-red-600 text-white rounded-lg shadow-lg z-50 flex items-center gap-2';
            logoutBtn.innerHTML = '<span class="material-symbols-outlined">logout</span> Logout';
            logoutBtn.onclick = () => { localStorage.removeItem('isLoggedIn'); window.location.href = '/login.html'; };
            document.body.appendChild(logoutBtn);
        }
    });
</script>
<style>
    body { background-color: #faf8ff; color: #131b2e; overflow-x: hidden; }
    .glass-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(53,37,205,0.1); box-shadow: 0 20px 40px -12px rgba(53,37,205,0.08); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #c7c4d8; border-radius: 10px; }
</style>
</head>
<body class="font-body-md text-on-surface">
<!-- Sidebar -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-white/70 backdrop-blur-xl border-r border-outline-variant/10 shadow-xl shadow-primary/5 flex flex-col p-stack-md gap-stack-sm z-50">
<div class="flex items-center gap-3 mb-8 px-2">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md font-bold text-primary leading-tight">ExplainAI</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-70">LoanWise Assistant</p>
</div>
</div>
<nav class="flex-1 flex flex-col gap-1">
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high/50 transition-all" href="/"><span class="material-symbols-outlined">home</span><span class="font-label-sm">Home</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high/50 transition-all" href="/apply.html"><span class="material-symbols-outlined">description</span><span class="font-label-sm">Application</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high/50 transition-all" href="/results.html"><span class="material-symbols-outlined">analytics</span><span class="font-label-sm">Results</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-surface-container-high/50 transition-all" href="/chat.html"><span class="material-symbols-outlined">forum</span><span class="font-label-sm">Chat</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl bg-primary/10 text-primary transition-all" href="/dashboard.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">assessment</span><span class="font-label-sm">All Reports</span></a>
</nav>
<button class="mt-auto w-full py-3 bg-primary text-on-primary rounded-xl font-label-sm flex items-center justify-center gap-2 hover:opacity-90" onclick="window.location.href='/apply.html'">
<span class="material-symbols-outlined">add</span> New Application</button>
</aside>
<!-- Main -->
<main class="ml-64 p-margin-desktop min-h-screen">
<div class="max-w-6xl mx-auto">
<div class="flex items-center justify-between mb-8">
<div>
<h2 class="font-display-lg text-display-lg">All <span class="text-primary">Applications</span></h2>
<p class="text-on-surface-variant font-body-lg" id="totalCount">Loading...</p>
</div>
<div class="flex gap-3">
<input id="searchInput" type="text" placeholder="Search by name..." class="bg-white/50 border border-outline-variant/30 rounded-xl py-2 px-4 font-body-md focus:outline-none focus:border-primary">
<select id="statusFilter" class="bg-white/50 border border-outline-variant/30 rounded-xl py-2 px-4 font-body-md focus:outline-none focus:border-primary">
<option value="">All Status</option>
<option value="Approved">Approved</option>
<option value="Denied">Denied</option>
<option value="Pending">Pending</option>
<option value="Under Review">Under Review</option>
</select>
</div>
</div>
<!-- Table -->
<div class="glass-card rounded-3xl overflow-hidden">
<table class="w-full text-left">
<thead class="bg-surface-container-high/50 border-b border-outline-variant/20">
<tr>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Applicant</th>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Loan</th>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Credit</th>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Income</th>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Status</th>
<th class="px-6 py-4 font-label-sm text-on-surface-variant">Action</th>
</tr>
</thead>
<tbody id="tableBody" class="divide-y divide-outline-variant/10"></tbody>
</table>
</div>
<!-- Pagination -->
<div class="flex items-center justify-between mt-6">
<p class="text-on-surface-variant font-label-sm" id="pageInfo"></p>
<div class="flex gap-2">
<button id="prevBtn" class="px-4 py-2 bg-white border border-outline-variant/30 rounded-xl font-label-sm hover:bg-surface-container-high/50 disabled:opacity-40" onclick="changePage(-1)">← Previous</button>
<button id="nextBtn" class="px-4 py-2 bg-primary text-on-primary rounded-xl font-label-sm hover:opacity-90 disabled:opacity-40" onclick="changePage(1)">Next →</button>
</div>
</div>
</div>
</main>
<script>
    let currentPage = 1;
    const limit = 10;
    
    async function loadApplications() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        let url = `/api/applications?page=${currentPage}&limit=${limit}&sortBy=createdAt&sortOrder=desc`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (status) url += `&status=${encodeURIComponent(status)}`;

        const res = await fetch(url);
        const data = await res.json();
        const { items, total, page, totalPages } = data.data;

        document.getElementById('totalCount').textContent = `${total} total applications`;
        document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = page <= 1;
        document.getElementById('nextBtn').disabled = page >= totalPages;

        const statusColors = {
            'Approved': 'bg-emerald-100 text-emerald-700',
            'Denied': 'bg-red-100 text-red-700',
            'Pending': 'bg-amber-100 text-amber-700',
            'Under Review': 'bg-blue-100 text-blue-700',
        };

        document.getElementById('tableBody').innerHTML = items.map(app => `
            <tr class="hover:bg-surface-container-low/50 transition-colors">
                <td class="px-6 py-4">
                    <div class="font-bold text-on-surface">${app.applicantName}</div>
                    <div class="text-xs text-on-surface-variant">${app.address.city}, ${app.address.state}</div>
                </td>
                <td class="px-6 py-4">
                    <div class="font-bold">$${app.loanAmount.toLocaleString()}</div>
                    <div class="text-xs text-on-surface-variant">${app.loanPurpose}</div>
                </td>
                <td class="px-6 py-4 font-bold">${app.creditScore}</td>
                <td class="px-6 py-4">$${app.income.toLocaleString()}</td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColors[app.status] || ''}">${app.status}</span>
                </td>
                <td class="px-6 py-4">
                    <a href="/results.html?id=${app.id}" class="text-primary hover:underline font-label-sm">View →</a>
                </td>
            </tr>
        `).join('');
    }

    function changePage(delta) { currentPage += delta; loadApplications(); }
    document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; loadApplications(); });
    document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; loadApplications(); });
    loadApplications();
</script>
</body></html>
