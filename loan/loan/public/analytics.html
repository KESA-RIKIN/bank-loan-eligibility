<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Analytics Dashboard | ExplainAI LoanWise</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&amp;family=Montserrat:wght@400;500;700&amp;family=Anybody:wght@400;500;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: { primary: "#3525cd", secondary: "#0058be", background: "#faf8ff", surface: "#faf8ff", "on-surface": "#131b2e", "on-surface-variant": "#464555", outline: "#777587" }, fontFamily: { display: ["Barlow Condensed"], body: ["Montserrat"], label: ["Anybody"] }}}};</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    if (!localStorage.getItem('isLoggedIn')) { window.location.href = '/login.html'; }
    document.addEventListener('DOMContentLoaded', () => {
        const aside = document.querySelector('aside');
        if (aside) {
            const logoutBtn = document.createElement('button');
            logoutBtn.className = 'mt-4 w-full py-3 bg-red-50 text-red-600 rounded-xl font-label-sm flex items-center justify-center gap-2 hover:bg-red-100 transition-all';
            logoutBtn.innerHTML = '<span class="material-symbols-outlined">logout</span> Logout';
            logoutBtn.onclick = () => { localStorage.removeItem('isLoggedIn'); window.location.href = '/login.html'; };
            aside.appendChild(logoutBtn);
        } else {
            const logoutBtn = document.createElement('button');
            logoutBtn.className = 'fixed bottom-4 right-4 px-4 py-2 bg-red-600 text-white rounded-lg shadow-lg z-50 flex items-center gap-2';
            logoutBtn.innerHTML = '<span class="material-symbols-outlined">logout</span> Logout';
            logoutBtn.onclick = () => { localStorage.removeItem('isLoggedIn'); window.location.href = '/login.html'; };
            document.body.appendChild(logoutBtn);
        }
    });
</script>
<style>
    body { background-color: #faf8ff; color: #131b2e; overflow-x: hidden; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(53, 37, 205, 0.1); box-shadow: 0 30px 50px -12px rgba(53, 37, 205, 0.08); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="font-body text-on-surface">
<!-- Sidebar -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-white/70 backdrop-blur-xl border-r border-outline/10 shadow-xl shadow-primary/5 flex flex-col p-4 z-50">
<div class="flex items-center gap-3 mb-8 px-2">
<div class="w-10 h-10 bg-secondary rounded-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<div>
<h1 class="font-display text-2xl font-bold text-secondary leading-tight">Admin</h1>
<p class="font-label text-xs text-on-surface-variant opacity-70">LoanWise Engine</p>
</div>
</div>
<nav class="flex-1 flex flex-col gap-1">
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-black/5 transition-all" href="/admin.html">
<span class="material-symbols-outlined">rule</span><span class="font-label">Rule Engine</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl bg-secondary/10 text-secondary transition-all" href="/analytics.html">
<span class="material-symbols-outlined">insights</span><span class="font-label">Analytics</span></a>
<a class="flex items-center gap-3 p-3 rounded-xl text-on-surface-variant hover:bg-black/5 transition-all" href="/dashboard.html">
<span class="material-symbols-outlined">home</span><span class="font-label">Back to App</span></a>
</nav>
</aside>

<!-- Main -->
<main class="ml-64 p-16 min-h-screen">
<div class="fixed top-0 right-0 -z-10 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[100px] pointer-events-none translate-x-1/3 -translate-y-1/3"></div>

<div class="max-w-6xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="font-display text-4xl font-bold mb-2">Performance <span class="text-primary">Analytics</span></h2>
            <p class="text-on-surface-variant font-body">Real-time overview of application processing and decisions.</p>
        </div>
        <button onclick="window.print()" class="px-6 py-3 bg-white border border-outline/20 text-on-surface rounded-xl font-bold hover:bg-surface-container-high transition-all shadow-sm flex items-center gap-2">
            <span class="material-symbols-outlined">download</span> Download PDF Report
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="kpiContainer">
        <!-- populated by js -->
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="glass-card p-8 rounded-3xl">
            <h3 class="font-display text-xl font-bold mb-6">Decision Distribution</h3>
            <div class="relative h-64 w-full flex justify-center">
                <canvas id="decisionChart"></canvas>
            </div>
        </div>
        <div class="glass-card p-8 rounded-3xl">
            <h3 class="font-display text-xl font-bold mb-6">Score Distribution</h3>
            <div class="relative h-64 w-full">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>
    </div>
</div>
</main>

<script>
    async function loadAnalytics() {
        try {
            const res = await fetch('/api/admin/analytics');
            const data = await res.json();
            if (data.success) {
                renderKPIs(data.data);
                renderCharts(data.data);
            }
        } catch (e) {
            console.error('Error fetching analytics', e);
        }
    }

    function renderKPIs(data) {
        const container = document.getElementById('kpiContainer');
        const approvalRate = data.totalApplications ? Math.round((data.approved / data.totalApplications) * 100) : 0;
        
        container.innerHTML = `
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-on-surface-variant font-label text-sm mb-2">Total Applications</p>
                <p class="font-display text-4xl font-bold text-primary">${data.totalApplications}</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-on-surface-variant font-label text-sm mb-2">Approval Rate</p>
                <p class="font-display text-4xl font-bold text-emerald-600">${approvalRate}%</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-on-surface-variant font-label text-sm mb-2">Average Score</p>
                <p class="font-display text-4xl font-bold text-secondary">${data.avgScore}</p>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <p class="text-on-surface-variant font-label text-sm mb-2">Manual Review</p>
                <p class="font-display text-4xl font-bold text-amber-500">${data.totalApplications - data.approved - data.denied}</p>
            </div>
        `;
    }

    function renderCharts(data) {
        // Decision Chart (Pie)
        const ctx1 = document.getElementById('decisionChart').getContext('2d');
        const manual = data.totalApplications - data.approved - data.denied;
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ['Approved', 'Denied', 'Manual Review'],
                datasets: [{
                    data: [data.approved, data.denied, manual],
                    backgroundColor: ['#059669', '#ef4444', '#f59e0b'],
                    borderWidth: 0,
                    cutout: '70%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Score Distribution (Bar)
        // For a real app, the API would return a histogram. We'll simulate a normal distribution centered around avgScore.
        const ctx2 = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['0-20', '21-40', '41-60', '61-80', '81-100'],
                datasets: [{
                    label: 'Applications',
                    data: [
                        Math.round(data.totalApplications * 0.05),
                        Math.round(data.totalApplications * 0.15),
                        Math.round(data.totalApplications * 0.40),
                        Math.round(data.totalApplications * 0.30),
                        Math.round(data.totalApplications * 0.10)
                    ],
                    backgroundColor: '#3525cd',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    loadAnalytics();
</script>
</body></html>
